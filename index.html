<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PKB RUNFEST 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#ecfdf5,#d1fae5);
min-height:100vh;
padding:20px;
display:flex;
justify-content:center;
align-items:center;
color:#14532d;
}

.container{
width:100%;
max-width:550px;
background:white;
border-radius:30px;
overflow:hidden;
box-shadow:0 15px 40px rgba(0,0,0,.15);
border:3px solid #22c55e;
animation:fade .8s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.banner img{
width:100%;
display:block;
}

.content{
padding:25px;
}

.title{
text-align:center;
margin-bottom:25px;
}

.title h1{
font-size:30px;
color:#16a34a;
font-weight:700;
}

.title p{
font-size:14px;
color:#4b5563;
margin-top:5px;
}

.form-group{
margin-bottom:16px;
}

label{
display:block;
margin-bottom:7px;
font-size:14px;
font-weight:600;
}

input,
select,
textarea{
width:100%;
padding:14px;
border:2px solid #bbf7d0;
border-radius:16px;
outline:none;
background:#f0fdf4;
font-size:14px;
color:#14532d;
transition:.3s;
}

input:focus,
select:focus,
textarea:focus{
border-color:#22c55e;
background:white;
}

textarea{
resize:none;
}

option{
color:black;
}

.payment-box{
margin-top:25px;
text-align:center;
}

.payment-box img{
width:100%;
border-radius:20px;
border:2px solid #22c55e;
}

.upload{
margin-top:20px;
border:2px dashed #22c55e;
padding:20px;
border-radius:18px;
text-align:center;
cursor:pointer;
background:#f0fdf4;
font-weight:600;
transition:.3s;
}

.upload:hover{
background:#dcfce7;
}

.preview{
margin-top:15px;
text-align:center;
}

.preview img{
max-width:220px;
border-radius:16px;
border:3px solid #22c55e;
}

button{
width:100%;
padding:16px;
margin-top:25px;
border:none;
border-radius:18px;
background:linear-gradient(90deg,#22c55e,#16a34a);
color:white;
font-size:16px;
font-weight:700;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(34,197,94,.3);
}

.success{
display:none;
margin-top:18px;
padding:14px;
border-radius:14px;
background:#16a34a;
color:white;
text-align:center;
font-weight:600;
}

.footer{
text-align:center;
padding:15px;
font-size:12px;
color:#4b5563;
}

</style>
</head>
<body>

<div class="container">

<!-- BANNER -->
<div class="banner">
<img src="banner.jpg" alt="Banner PKB RUNFEST">
</div>

<div class="content">

<div class="title">
<h1>PKB RUNFEST 2026</h1>
<p>Pendaftaran Peserta Resmi</p>
</div>

<form id="form">

<div class="form-group">
<label>Nama Lengkap</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Nomor WhatsApp</label>
<input type="tel" required>
</div>

<div class="form-group">
<label>Email Aktif</label>
<input type="email" required>
</div>

<div class="form-group">
<label>Kategori Lari</label>
<select required>
<option value="">Pilih Kategori</option>
<option>5K Fun Run - Rp150.000</option>
<option>10K Fun Run - Rp175.000</option>
</select>
</div>

<div class="form-group">
<label>Ukuran Kaos</label>
<select required>
<option value="">Pilih Ukuran</option>
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
<option>XXL</option>
<option>XXXL</option>
<option>4XL</option>
</select>
</div>

<div class="form-group">
<label>Alamat Lengkap</label>
<textarea rows="3"></textarea>
</div>

<!-- DIGITAL MARKETING QRIS -->
<div class="payment-box">
<img src="qris.jpg" alt="Digital Marketing">
</div>

<div class="form-group">

<label>Upload Bukti Pembayaran</label>

<div class="upload" onclick="document.getElementById('upload').click()">
📤 Klik Upload Bukti Pembayaran
</div>

<input type="file" id="upload" hidden accept="image/*">

<div class="preview" id="preview"></div>

</div>

<button type="submit">
DAFTAR SEKARANG
</button>

<div class="success" id="success">
✅ Pendaftaran Berhasil
</div>

</form>

</div>

<div class="footer">
PKB RUNFEST 2026 © All Rights Reserved
</div>

</div>

<script>

const upload = document.getElementById('upload');
const preview = document.getElementById('preview');

upload.addEventListener('change', function(){

const file = this.files[0];

if(file){

const reader = new FileReader();

reader.onload = function(e){

preview.innerHTML = `
<img src="${e.target.result}">
`;

}

reader.readAsDataURL(file);

}

});

document.getElementById('form')
.addEventListener('submit', function(e){

e.preventDefault();

document.getElementById('success')
.style.display='block';

});

</script>

</body>
</html>
