
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Pendaftaran Event Run</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b,#0f172a);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
color:white;
}

.container{
width:100%;
max-width:700px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.15);
border-radius:25px;
padding:35px;
box-shadow:0 20px 60px rgba(0,0,0,.4);
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}

.logo{
text-align:center;
font-size:34px;
font-weight:700;
color:#38bdf8;
margin-bottom:8px;
}

.sub{
text-align:center;
color:#cbd5e1;
margin-bottom:25px;
}

.form-group{
margin-bottom:18px;
}

label{
display:block;
margin-bottom:8px;
font-weight:500;
}

input,select,textarea{
width:100%;
padding:15px;
border:none;
border-radius:14px;
background:rgba(255,255,255,.12);
color:white;
font-size:15px;
outline:none;
transition:.3s;
}

input:focus,select:focus,textarea:focus{
background:rgba(255,255,255,.18);
transform:scale(1.02);
}

option{
color:black;
}

.upload-box{
border:2px dashed #38bdf8;
padding:20px;
text-align:center;
border-radius:15px;
cursor:pointer;
transition:.3s;
}

.upload-box:hover{
background:rgba(56,189,248,.15);
}

.preview{
margin-top:15px;
text-align:center;
}

.preview img{
max-width:220px;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,.3);
}

button{
width:100%;
padding:18px;
border:none;
border-radius:16px;
background:linear-gradient(90deg,#38bdf8,#0ea5e9);
color:white;
font-size:17px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-3px);
box-shadow:0 10px 25px rgba(56,189,248,.4);
}

.success{
display:none;
margin-top:18px;
padding:15px;
background:#16a34a;
border-radius:14px;
text-align:center;
font-weight:600;
animation:fadeIn .5s ease;
}

@media(max-width:600px){
.container{
padding:22px;
}
.logo{
font-size:28px;
}
}
</style>
</head>
<body>

<div class="container">
<div class="logo">MCRUN EVENT</div>
<div class="sub">Form Pendaftaran Peserta Resmi</div>

<form id="registerForm">

<div class="form-group">
<label>Nama Lengkap</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" required>
</div>

<div class="form-group">
<label>Nomor WhatsApp</label>
<input type="tel" required>
</div>

<div class="form-group">
<label>Jenis Kelamin</label>
<select required>
<option value="">Pilih</option>
<option>Laki-Laki</option>
<option>Perempuan</option>
</select>
</div>

<div class="form-group">
<label>Kategori Lomba</label>
<select required>
<option value="">Pilih Kategori</option>
<option>5K Fun Run</option>
<option>10K Challenge</option>
<option>21K Half Marathon</option>
</select>
</div>

<div class="form-group">
<label>Alamat Lengkap</label>
<textarea rows="3" required></textarea>
</div>

<div class="form-group">
<label>Upload Bukti Pembayaran</label>
<div class="upload-box" onclick="document.getElementById('upload').click()">
Klik Upload Bukti
</div>
<input type="file" id="upload" accept="image/*" hidden>
<div class="preview" id="preview"></div>
</div>

<button type="submit">DAFTAR SEKARANG</button>

<div class="success" id="successMsg">
Pendaftaran Berhasil Terkirim ✅
</div>

</form>
</div>

<script>
const upload = document.getElementById("upload");
const preview = document.getElementById("preview");

upload.addEventListener("change",function(){
const file=this.files[0];
if(file){
const reader=new FileReader();
reader.onload=function(e){
preview.innerHTML=`<img src="${e.target.result}">`;
}
reader.readAsDataURL(file);
}
});

document.getElementById("registerForm").addEventListener("submit",function(e){
e.preventDefault();
document.getElementById("successMsg").style.display="block";
this.reset();
preview.innerHTML="";
window.scrollTo({top:0,behavior:'smooth'});
});
</script>

</body>
</html>
